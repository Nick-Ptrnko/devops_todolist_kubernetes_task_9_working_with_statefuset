apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapp
  namespace: todoapp
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: todoapp
  template:
    metadata:
      labels:
        app: todoapp
    spec:
      containers:
      - name: todoapp
        image: ikulyk404/todoapp:3.0.0
        resources:
          requests:
            memory: "256Mi"
            cpu: "150m"
          limits:
            memory: "256Mi"
            cpu: "150m"
        env:
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PYTHONUNBUFFERED
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: SECRET_KEY
        - name: DB_ENGINE
          value: "django.db.backends.mysql"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-connection
              key: NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-connection
              key: USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-connection
              key: PASSWORD
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-connection
              key: HOST
        - name: DB_PORT
          value: "3306"

        ports:
        - containerPort: 8080

        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: app-secrets-volume
          mountPath: "/app/secrets"
          readOnly: true
        - name: app-config-volume
          mountPath: "/app/configs"
          readOnly: true
        # Монтування виправленого файлу налаштувань
        - name: settings-patch-vol
          mountPath: /app/todolist/settings.py
          subPath: settings.py

      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: pvc-data
      - name: app-secrets-volume
        secret:
          secretName: app-secret
      - name: app-config-volume
        configMap:
          name: app-config
      # Оголошення тому для підміни settings.py
      - name: settings-patch-vol
        configMap:
          name: app-settings-patch
