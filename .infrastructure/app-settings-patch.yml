apiVersion: v1
kind: ConfigMap
metadata:
  name: app-settings-patch
  namespace: todoapp
data:
  settings.py: |
    import os
    BASE_DIR = os.path.dirname(os.path.dirname(__file__))
    SECRET_KEY = os.environ.get("SECRET_KEY", "default-key-if-missing")
    DEBUG = True
    ALLOWED_HOSTS = ["*"]
    DEFAULT_AUTO_FIELD = "django.db.models.AutoField"
    
    INSTALLED_APPS = (
        "django.contrib.admin", "django.contrib.auth", "django.contrib.contenttypes",
        "django.contrib.sessions", "django.contrib.messages", "django.contrib.staticfiles",
        "todolist", "lists", "accounts", "rest_framework", "api",
    )
    MIDDLEWARE = (
        "django.middleware.security.SecurityMiddleware",
        "django.contrib.sessions.middleware.SessionMiddleware",
        "django.middleware.common.CommonMiddleware",
        "django.middleware.csrf.CsrfViewMiddleware",
        "django.contrib.auth.middleware.AuthenticationMiddleware",
        "django.contrib.messages.middleware.MessageMiddleware",
        "django.middleware.clickjacking.XFrameOptionsMiddleware",
    )
    ROOT_URLCONF = "todolist.urls"
    WSGI_APPLICATION = "todolist.wsgi.application"

    # Динамічне налаштування бази даних через змінні оточення
    DATABASES = {
        "default": {
            "ENGINE": os.environ.get("DB_ENGINE", "django.db.backends.mysql"),
            "NAME": os.environ.get("DB_NAME", "todo_db"),
            "USER": os.environ.get("DB_USER", "root"),
            "PASSWORD": os.environ.get("DB_PASSWORD", ""),
            "HOST": os.environ.get("DB_HOST", "localhost"),
            "PORT": os.environ.get("DB_PORT", "3306"),
        }
    }

    LANGUAGE_CODE = "en-us"
    TIME_ZONE = "UTC"
    USE_I18N = USE_L10N = USE_TZ = True
    STATIC_URL = "/static/"
    LOGIN_URL = "/auth/login/"
    LOGOUT_URL = "/auth/logout/"
    REST_FRAMEWORK = {
        "DEFAULT_PERMISSION_CLASSES": ["rest_framework.permissions.DjangoModelPermissionsOrAnonReadOnly"]
    }
    TEMPLATES = [{
        "BACKEND": "django.template.backends.django.DjangoTemplates",
        "APP_DIRS": True,
        "OPTIONS": {
            "context_processors": [
                "django.contrib.auth.context_processors.auth",
                "django.contrib.messages.context_processors.messages",
                "django.template.context_processors.request",
            ],
            "debug": True,
        },
    }]
